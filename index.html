<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Fiance 💖</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #ff4d6d, #ff8fa3, #ffc2d1);
  font-family: "Poppins", sans-serif;
  color: #fff;
  overflow: hidden;
}
.container {
  text-align: center;
  padding: 40px 20px;
}
.title {
  font-size: 3rem;
  margin-top: 15px;
}
.question-box {
  margin-top: 25px;
  background: rgba(255,255,255,0.2);
  padding: 18px;
  border-radius: 14px;
  display: inline-block;
  backdrop-filter: blur(6px);
}
.btn {
  padding: 12px 25px;
  margin: 8px;
  border: none;
  border-radius: 999px;
  font-size: 1.2rem;
  cursor: pointer;
  position: relative;
}
.yes { background: #c9184a; color: white; }
.no { background: #1dd1a1; color: white; }

/* Floating emojis */
.emoji {
  position: fixed;
  font-size: 25px;
  animation: floatUp 5s linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Falling emojis */
.fall {
  animation: fall 4s linear infinite;
}
@keyframes fall {
  0% { transform: translateY(-50px); opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <h1 class="title">My Best Friend 💖</h1>

  <div class="question-box">
    <p style="font-size:1.6rem;" id="questionText">
      Will you marry me? 💍
    </p>

    <button class="btn yes" id="yesBtn">No</button>
    <button class="btn no" id="noBtn">Yes</button>
  </div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const questionText = document.getElementById("questionText");

let heartInterval;

// ❤️ Start → heart floating
function startHearts() {
  heartInterval = setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("emoji");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.bottom = "0";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

startHearts();

// YES click → stop hearts + 😂 rain
yesBtn.addEventListener("click", () => {
  questionText.innerText = "😂 April Fool! You know this is April fool month 😂";

  clearInterval(heartInterval);

  // 😂 falling emojis
  setInterval(() => {
    let emoji = document.createElement("div");
    emoji.classList.add("emoji", "fall");
    emoji.innerText = "😂";
    emoji.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(emoji);

    setTimeout(() => emoji.remove(), 4000);
  }, 200);
});

// NO button runs away 😄
noBtn.addEventListener("mouseover", () => {
  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random() * 80 + "%";
  noBtn.style.top = Math.random() * 70 + "%";
});
</script>

</body>
</html>
